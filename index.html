<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <!-- <script src="/utils/date.js"></script>
    <script src="/utils/urls.js"></script> -->
    <script type="module" src="content.js" defer></script>
</head>
<body>
     <header>
        <div class="logo-container">
            <img src="assets/icons/icon128.png" alt="logo" height="40px" width="40px">
            <h1 class="app-name">The Web Note</h1>
        </div>

        <div class="input-group">
            <textarea 
                class="task-input" 
                placeholder="What needs to be done?" 
                rows="1" id="taskInputField" autofocus></textarea>
                <div class="inputImageSection">
                    <label for="inputImage" class="custom-file-upload" id="imageInputIcon">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#3b82f6"><path d="M480-480ZM200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h320v80H200v560h560v-320h80v320q0 33-23.5 56.5T760-120H200Zm40-160h480L570-480 450-320l-90-120-120 160Zm440-320v-80h-80v-80h80v-80h80v80h80v80h-80v80h-80Z"/></svg>
                    </label>
                    <input type="file" id="inputImage" accept="image/*" title="inputImage" class="inputImage"></input>
                </div>
            </div>
            <div class="preview-img" id="previewImgContainer">
                <img src="#"id="previewImage">
            </div>

        <div class="nav-controls">
            <button class="btn btn-add" id="addTask">
                <span>+</span> Add Task
            </button>
            <button class="btn btn-dashboard" id="dashboardBtn">
             Dashboard
            </button>
        </div>
    </header>

    <main class="task-container" id="task-container">
        <div class="placeholder-container">
            <svg width="260" height="200" viewBox="0 0 260 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="130" cy="80" r="50" fill="#f2f4f7"/>

  <!-- Note icon -->
  <rect x="105" y="50" width="50" height="60" rx="6" fill="#ffffff" stroke="#cfd6dd" stroke-width="2"/>

  <!-- Note lines -->
  <line x1="115" y1="65" x2="145" y2="65" stroke="#d0d6dc" stroke-width="2"/>
  <line x1="115" y1="75" x2="145" y2="75" stroke="#d0d6dc" stroke-width="2"/>
  <line x1="115" y1="85" x2="135" y2="85" stroke="#d0d6dc" stroke-width="2"/>

  <!-- Magnifying glass -->
  <circle cx="155" cy="95" r="12" fill="none" stroke="#b8c0c8" stroke-width="3"/>
  <line x1="163" y1="103" x2="175" y2="115" stroke="#b8c0c8" stroke-width="3" stroke-linecap="round"/>

  <!-- Text -->
  <text x="130" y="150" text-anchor="middle" class="title">Nothing to show</text>
  <text x="130" y="170" text-anchor="middle" class="subtitle">No notes for this website yet.</text>
</svg>
        </div>
    </main>
  
</body>
</html>
