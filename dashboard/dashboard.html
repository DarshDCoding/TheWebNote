<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <title>TheWebNote - Dashboard</title>

    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="../darkMode.css" />

    <script src="../libs/jspdf.min.js" defer></script>
    <script src="../libs/jszip.min.js" defer></script>

    <script type="module" src="dashboard.js" defer></script>
  </head>
  <body>
    <header>
      <div class="logo-container">
        <img
          src="../assets/icons/icon128.png"
          alt="logo"
          height="40px"
          width="40px"
        />
        <h1 class="app-name">The Web Note</h1>
        <button
          class="btn-theme"
          id="themeToggle"
          title="Toggle dark mode"
        ></button>
      </div>
      <p class="dashboard-subtitle">All your notes, across every site.</p>
      <div class="nav-controls">
        <button class="btn btn-back" id="backBtn">Back</button>
        <button class="btn btn-export" id="exportBtn">Export</button>
      </div>
    </header>

    <main class="sites-container" id="dashboard-container"></main>

    <!-- Export Modal -->
    <div class="modal-overlay" id="exportOverlay">
      <div class="modal-card" id="exportModal">
        <!-- Header -->
        <div class="modal-header">
          <h2 class="modal-title">Export Notes</h2>
          <button class="modal-close" id="exportModalClose">Back</button>
        </div>

        <!-- Body -->
        <div class="modal-body">
          <!-- Sites Section -->
          <div class="modal-section">
            <div class="modal-section-header">
              <h3 class="modal-section-title">Select Sites</h3>
              <button class="btn-select-all" id="selectAllBtn">
                Select All
              </button>
            </div>
            <div class="modal-site-list" id="exportSiteList">
              <!-- populated dynamically -->
            </div>
          </div>

          <!-- Formats Section -->
          <div class="modal-section">
            <h3 class="modal-section-title">Select Formats</h3>
            <p class="modal-section-sub">
              JSON is always included automatically.
            </p>
            <div class="modal-format-list" id="exportFormatList"></div>
          </div>
        </div>

        <!-- Footer -->
        <div class="modal-footer">
          <button class="btn btn-back" id="exportModalCancel">Cancel</button>
          <button class="btn btn-export" id="exportConfirmBtn">Export</button>
        </div>
      </div>
    </div>
  </body>
</html>
