<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <title>TheWebNote - Dashboard</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="../darkMode.css">
  <script type="module" src="dashboard.js" defer></script>
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="../assets/icons/icon128.png" alt="logo" height="40px" width="40px">
      <h1 class="app-name">The Web Note</h1>
      <button class="btn-theme" id="themeToggle" title="Toggle dark mode"></button>
    </div>
    <p class="dashboard-subtitle">All your notes, across every site.</p>
    <div class="nav-controls">
      <button class="btn btn-back" id="backBtn">Back</button>
    </div>
  </header>

  <main class="sites-container" id="dashboard-container"></main>

</body>
</html>
