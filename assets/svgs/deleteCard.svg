<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>

    <!-- subtle gradient -->
    <linearGradient id="binGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f8dfc"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="95" r="60" fill="#f6f8fb"/>

  <!-- Trash Bin -->
  <g filter="url(#shadow)">
    <rect x="68" y="72" width="64" height="10" rx="5" fill="url(#binGrad)"/>
    <rect x="72" y="82" width="56" height="48" rx="10" fill="url(#binGrad)"/>
  </g>

  <!-- Paper (note) -->
  <rect x="85" y="92" width="30" height="28" rx="4" fill="#ffffff" opacity="0.95"/>

  <!-- Note lines -->
  <line x1="90" y1="100" x2="110" y2="100" stroke="#dbe3ef" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="108" x2="110" y2="108" stroke="#dbe3ef" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="116" x2="105" y2="116" stroke="#dbe3ef" stroke-width="2" stroke-linecap="round"/>

  <!-- Vibrant red delete cross -->
  <line x1="88" y1="94" x2="112" y2="118" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="112" y1="94" x2="88" y2="118" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>

</svg>